name: Build RepoGhost Desktop

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: repoghost-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      BUNDLE_GLOB: src-tauri/target/release/bundle/nsis/*.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Load desktop config from jac.toml
        id: repo_config
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("jac.toml").read_text())
          project = data.get("project", {})
          desktop = data.get("tool", {}).get("repoghost", {}).get("desktop", {})

          output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
              fh.write(f"project_name={project.get('name', 'repoghost')}\n")
              fh.write(f"project_version={project.get('version', '')}\n")
              fh.write(f"packaging_target={desktop.get('packaging_target', '')}\n")
              fh.write(f"widget_mode={desktop.get('widget_mode', '')}\n")
              fh.write(f"workspace_mode={desktop.get('workspace_mode', '')}\n")
          PY

      - name: Install Jac toolchain
        shell: bash
        run: python -m pip install --upgrade pip jaclang jac-client

      - name: Restore Jac dependencies
        shell: bash
        run: jac install

      - name: Build Jac app
        shell: bash
        run: jac build

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --locked

      - name: Package Windows installer
        if: steps.repo_config.outputs.packaging_target == 'tauri'
        shell: bash
        run: cargo tauri build --config src-tauri/tauri.conf.json --bundles nsis

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: repoghost-windows
          if-no-files-found: error
          path: ${{ env.BUNDLE_GLOB }}

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      BUNDLE_GLOB: src-tauri/target/release/bundle/dmg/*.dmg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Load desktop config from jac.toml
        id: repo_config
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("jac.toml").read_text())
          project = data.get("project", {})
          desktop = data.get("tool", {}).get("repoghost", {}).get("desktop", {})

          output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
              fh.write(f"project_name={project.get('name', 'repoghost')}\n")
              fh.write(f"project_version={project.get('version', '')}\n")
              fh.write(f"packaging_target={desktop.get('packaging_target', '')}\n")
              fh.write(f"widget_mode={desktop.get('widget_mode', '')}\n")
              fh.write(f"workspace_mode={desktop.get('workspace_mode', '')}\n")
          PY

      - name: Install Jac toolchain
        shell: bash
        run: python -m pip install --upgrade pip jaclang jac-client

      - name: Restore Jac dependencies
        shell: bash
        run: jac install

      - name: Build Jac app
        shell: bash
        run: jac build

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --locked

      - name: Package macOS bundle
        if: steps.repo_config.outputs.packaging_target == 'tauri'
        shell: bash
        run: cargo tauri build --config src-tauri/tauri.conf.json --bundles dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: repoghost-macos
          if-no-files-found: error
          path: ${{ env.BUNDLE_GLOB }}

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    env:
      BUNDLE_GLOB: src-tauri/target/release/bundle/appimage/*.AppImage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Load desktop config from jac.toml
        id: repo_config
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("jac.toml").read_text())
          project = data.get("project", {})
          desktop = data.get("tool", {}).get("repoghost", {}).get("desktop", {})

          output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
              fh.write(f"project_name={project.get('name', 'repoghost')}\n")
              fh.write(f"project_version={project.get('version', '')}\n")
              fh.write(f"packaging_target={desktop.get('packaging_target', '')}\n")
              fh.write(f"widget_mode={desktop.get('widget_mode', '')}\n")
              fh.write(f"workspace_mode={desktop.get('workspace_mode', '')}\n")
          PY

      - name: Install Jac toolchain
        shell: bash
        run: python -m pip install --upgrade pip jaclang jac-client

      - name: Restore Jac dependencies
        shell: bash
        run: jac install

      - name: Build Jac app
        shell: bash
        run: jac build

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --locked

      - name: Package Linux bundle
        if: steps.repo_config.outputs.packaging_target == 'tauri'
        shell: bash
        run: cargo tauri build --config src-tauri/tauri.conf.json --bundles appimage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: repoghost-linux
          if-no-files-found: error
          path: ${{ env.BUNDLE_GLOB }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - build-linux
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: repoghost-windows
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: repoghost-macos
          path: dist/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: repoghost-linux
          path: dist/linux

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/**/*.exe
            dist/macos/**/*.dmg
            dist/linux/**/*.AppImage
